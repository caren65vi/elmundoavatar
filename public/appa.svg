<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <!-- Body (main fluffy white shape) -->
  <ellipse cx="100" cy="115" rx="75" ry="52" fill="#F5F0E8"/>

  <!-- Fluffy texture bumps on body -->
  <ellipse cx="55"  cy="95"  rx="22" ry="18" fill="#EDE8DC"/>
  <ellipse cx="80"  cy="88"  rx="24" ry="17" fill="#EDE8DC"/>
  <ellipse cx="108" cy="86"  rx="24" ry="17" fill="#EDE8DC"/>
  <ellipse cx="135" cy="95"  rx="20" ry="16" fill="#EDE8DC"/>
  <ellipse cx="152" cy="112" rx="15" ry="13" fill="#EDE8DC"/>
  <ellipse cx="46"  cy="110" rx="16" ry="14" fill="#EDE8DC"/>

  <!-- White fluffy layer on top -->
  <ellipse cx="55"  cy="97"  rx="19" ry="15" fill="#FDFAF4"/>
  <ellipse cx="80"  cy="90"  rx="21" ry="14" fill="#FDFAF4"/>
  <ellipse cx="108" cy="88"  rx="21" ry="14" fill="#FDFAF4"/>
  <ellipse cx="135" cy="97"  rx="18" ry="13" fill="#FDFAF4"/>

  <!-- Brown saddle stripe across the back -->
  <path d="M52 98 Q100 82 148 98" stroke="#8B6340" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M52 98 Q100 82 148 98" stroke="#A0714A" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Head -->
  <ellipse cx="100" cy="72" rx="40" ry="34" fill="#F5F0E8"/>

  <!-- Head fluffy texture -->
  <ellipse cx="80"  cy="60" rx="16" ry="12" fill="#FDFAF4"/>
  <ellipse cx="100" cy="55" rx="18" ry="11" fill="#FDFAF4"/>
  <ellipse cx="120" cy="60" rx="16" ry="12" fill="#FDFAF4"/>

  <!-- Brown marking on top of head -->
  <ellipse cx="100" cy="50" rx="28" ry="14" fill="#8B6340" opacity="0.45"/>
  <ellipse cx="100" cy="50" rx="22" ry="10" fill="#A0714A" opacity="0.35"/>

  <!-- Arrow on forehead (air nomad mark) -->
  <path d="M100 36 L100 62" stroke="#7A9BAA" stroke-width="4" stroke-linecap="round"/>
  <path d="M100 36 L90 48" stroke="#7A9BAA" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M100 36 L110 48" stroke="#7A9BAA" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Horns -->
  <path d="M78 44 Q70 22 75 14" stroke="#3D2B1A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M122 44 Q130 22 125 14" stroke="#3D2B1A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Horn tips -->
  <circle cx="75" cy="14" r="3.5" fill="#3D2B1A"/>
  <circle cx="125" cy="14" r="3.5" fill="#3D2B1A"/>

  <!-- Face — brown snout area -->
  <ellipse cx="100" cy="84" rx="26" ry="16" fill="#C49A6C"/>
  <ellipse cx="100" cy="83" rx="22" ry="13" fill="#D4A87A"/>

  <!-- Nose -->
  <ellipse cx="92" cy="79" rx="7" ry="5" fill="#8B5C30"/>
  <ellipse cx="108" cy="79" rx="7" ry="5" fill="#8B5C30"/>
  <ellipse cx="92" cy="78" rx="5" ry="3.5" fill="#6B3D18"/>
  <ellipse cx="108" cy="78" rx="5" ry="3.5" fill="#6B3D18"/>
  <!-- Nostril highlights -->
  <ellipse cx="90" cy="77" rx="2" ry="1.5" fill="#4A2410" opacity="0.7"/>
  <ellipse cx="106" cy="77" rx="2" ry="1.5" fill="#4A2410" opacity="0.7"/>

  <!-- Eyes -->
  <ellipse cx="83" cy="66" rx="9" ry="8" fill="#2C1A0A"/>
  <ellipse cx="117" cy="66" rx="9" ry="8" fill="#2C1A0A"/>
  <!-- Iris -->
  <ellipse cx="83" cy="66" rx="6" ry="6" fill="#5A3010"/>
  <ellipse cx="117" cy="66" rx="6" ry="6" fill="#5A3010"/>
  <!-- Pupil -->
  <ellipse cx="83" cy="66" rx="3.5" ry="3.5" fill="#1A0A00"/>
  <ellipse cx="117" cy="66" rx="3.5" ry="3.5" fill="#1A0A00"/>
  <!-- Eye shine -->
  <circle cx="85" cy="64" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="119" cy="64" r="1.5" fill="white" opacity="0.9"/>

  <!-- Smile -->
  <path d="M90 92 Q100 100 110 92" stroke="#6B3D18" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Front left leg -->
  <ellipse cx="68" cy="152" rx="13" ry="18" fill="#EDE8DC"/>
  <ellipse cx="68" cy="152" rx="10" ry="14" fill="#FDFAF4"/>
  <!-- Front left foot -->
  <ellipse cx="68" cy="165" rx="13" ry="7" fill="#8B6340"/>
  <ellipse cx="60" cy="167" rx="5" ry="3.5" fill="#6B4828"/>
  <ellipse cx="68" cy="169" rx="5" ry="3.5" fill="#6B4828"/>
  <ellipse cx="76" cy="167" rx="5" ry="3.5" fill="#6B4828"/>

  <!-- Front right leg -->
  <ellipse cx="132" cy="152" rx="13" ry="18" fill="#EDE8DC"/>
  <ellipse cx="132" cy="152" rx="10" ry="14" fill="#FDFAF4"/>
  <!-- Front right foot -->
  <ellipse cx="132" cy="165" rx="13" ry="7" fill="#8B6340"/>
  <ellipse cx="124" cy="167" rx="5" ry="3.5" fill="#6B4828"/>
  <ellipse cx="132" cy="169" rx="5" ry="3.5" fill="#6B4828"/>
  <ellipse cx="140" cy="167" rx="5" ry="3.5" fill="#6B4828"/>

  <!-- Back left leg (peeking out) -->
  <ellipse cx="48" cy="150" rx="11" ry="16" fill="#EDE8DC" opacity="0.9"/>
  <ellipse cx="48" cy="162" rx="12" ry="6" fill="#8B6340" opacity="0.85"/>

  <!-- Back right leg (peeking out) -->
  <ellipse cx="152" cy="150" rx="11" ry="16" fill="#EDE8DC" opacity="0.9"/>
  <ellipse cx="152" cy="162" rx="12" ry="6" fill="#8B6340" opacity="0.85"/>

  <!-- Fluffy tail (beaver-like) -->
  <ellipse cx="175" cy="135" rx="20" ry="12" fill="#C49A6C" opacity="0.9"/>
  <ellipse cx="175" cy="135" rx="16" ry="9" fill="#D4A87A"/>
  <!-- Tail stripes -->
  <path d="M158 130 Q175 126 192 130" stroke="#8B6340" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M156 135 Q175 131 194 135" stroke="#8B6340" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M158 140 Q175 136 192 140" stroke="#8B6340" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
